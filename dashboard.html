<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="dashboard.css">
</head>
<body>

<header>
  <h1>Work Dashboard</h1>
  <span class="date" id="dateDisplay"></span>
  <button class="export-btn" onclick="reassignColors()">🎨 Reassign colors</button>
  <button class="export-btn" onclick="exportData()">⬇ Export data</button>
</header>

<div class="layout">
  <div class="projects-col">
    <div class="legend">
      <span class="legend-item"><span class="energy-dot energy-high"></span> High energy</span>
      <span class="legend-item"><span class="energy-dot energy-med"></span> Medium energy</span>
      <span class="legend-item"><span class="energy-dot energy-low"></span> Low energy</span>
    </div>
    <div class="projects-header">
      <h2>Projects</h2>
      <button class="add-btn" onclick="openModal()">+ Add project</button>
    </div>
    <div id="projectList"></div>
  </div>

  <div class="sidebar">
    <div class="timer-panel">
      <h2>Focus Timer</h2>
      <div class="timer-progress"><div class="timer-progress-bar" id="progressBar"></div></div>
      <div class="timer-display" id="timerDisplay">45:00</div>
      <div class="timer-label" id="timerLabel">Ready</div>
      <div class="timer-expand-row">
        <button class="timer-expand-btn" id="timerExpandBtn" onclick="toggleTimerControls()">▶ controls</button>
      </div>
      <div id="timerControls" style="display:none;">
        <div class="timer-controls">
          <button class="timer-btn primary" id="startStopBtn" onclick="toggleTimer()">Start</button>
          <button class="timer-btn" onclick="resetTimer()">Reset</button>
          <button class="timer-btn" onclick="addTime(5)">+5 min</button>
        </div>
        <div class="timer-presets">
          <button class="preset-btn selected" onclick="setPreset(45, this)">45 min</button>
          <button class="preset-btn" onclick="setPreset(25, this)">25 min</button>
          <button class="preset-btn" onclick="setPreset(60, this)">60 min</button>
          <button class="preset-btn" onclick="setPreset(15, this)">15 min</button>
        </div>
      </div>
      <div class="activity-log">
        <div class="activity-log-header">
          <h3>Activity</h3>
          <button class="activity-other-btn" onclick="logOtherActivity()">+ Other</button>
        </div>
        <div class="activity-log-window" id="activityLog"></div>
      </div>
    </div>

    <div class="completed-panel">
      <div class="completed-panel-header">
        <h2>✓ Completed</h2>
        <button class="completed-other-btn" onclick="addOtherCompleted()">+ Other</button>
      </div>
      <ul class="completed-list" id="completedList"></ul>
    </div>

    <div class="chart-panel">
      <div class="chart-panel-header">
        <h2>Recent Activity</h2>
        <select id="chartDaysSelect" class="chart-days-select" onchange="onChartDaysChange(this.value)">
          <option value="7">7 days</option>
          <option value="14" selected>14 days</option>
          <option value="30">30 days</option>
        </select>
      </div>
      <canvas id="activityChart" style="width:100%;display:block;"></canvas>
      <p class="chart-empty" id="chartEmpty"></p>
    </div>
  </div>
</div>

<!-- Add Project Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3>Add Project</h3>
    <label>Project name</label>
    <input type="text" id="newName" placeholder="e.g. Holographic framework">
    <label>Category</label>
    <select id="newCategory">
      <option value="Writing">Writing</option>
      <option value="Job Search">Job Search</option>
      <option value="Design">Design</option>
      <option value="Streaming">Streaming</option>
      <option value="Other">Other</option>
    </select>
    <label>Energy required</label>
    <select id="newEnergy">
      <option value="high">High — needs focus</option>
      <option value="med" selected>Medium</option>
      <option value="low">Low — can do tired</option>
    </select>
    <label>First next action</label>
    <input type="text" id="newNext" placeholder="e.g. Open doc and read last section">
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveProject()">Add project</button>
    </div>
  </div>
</div>

<div class="notif" id="notif"></div>

<script src="dashboard.js"></script>
</body>
</html>
